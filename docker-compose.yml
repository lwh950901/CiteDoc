services:
  db:
    image: pgvector/pgvector:pg16
    container_name: docqa-pgvector
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: docqa
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
